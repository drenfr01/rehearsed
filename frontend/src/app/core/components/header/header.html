@if (isLoggedIn()) {
  <mat-toolbar color="primary" class="app-header">
    <div class="header-container">
      <img src="/rehearsed-logo.png" alt="Rehearsed Logo" class="header-logo" />
      <nav class="nav-center">
        @for (route of routes; track route.path) {
          <a 
            mat-button
            [routerLink]="route.path" 
            routerLinkActive="active-link"
            class="nav-link"
          >
            {{ route.label }}
          </a>
        }
        <span class="nav-divider">|</span>
        @for (route of userContentRoutes; track route.path) {
          <a 
            mat-button
            [routerLink]="route.path" 
            routerLinkActive="active-link"
            class="nav-link user-content-link"
          >
            <mat-icon>{{ route.icon }}</mat-icon>
            {{ route.label }}
          </a>
        }
        @if (isAdmin()) {
          <span class="nav-divider">|</span>
          @for (route of adminRoutes; track route.path) {
            <a 
              mat-button
              [routerLink]="route.path" 
              routerLinkActive="active-link"
              class="nav-link admin-link"
            >
              <mat-icon>admin_panel_settings</mat-icon>
              {{ route.label }}
            </a>
          }
        }
      </nav>
      
      <div class="nav-right">
        <button 
          mat-raised-button 
          color="accent"
          (click)="createSession()"
          [matTooltip]="getTruncatedSessionId()"
          matTooltipPosition="below"
        >
          <mat-icon>add_circle</mat-icon>
          New Session
        </button>
        
        <button 
          mat-raised-button 
          color="warn"
          (click)="logout()"
          class="logout-button"
        >
          <mat-icon>logout</mat-icon>
          Logout
        </button>
      </div>
    </div>
  </mat-toolbar>
}
