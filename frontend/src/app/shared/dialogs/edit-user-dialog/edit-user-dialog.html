<h2 mat-dialog-title>
  <mat-icon>edit</mat-icon>
  Edit User
</h2>

<mat-dialog-content>
  <form [formGroup]="editForm" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" placeholder="user@example.com">
      @if (editForm.get('email')?.hasError('required')) {
        <mat-error>Email is required</mat-error>
      }
      @if (editForm.get('email')?.hasError('email')) {
        <mat-error>Please enter a valid email</mat-error>
      }
    </mat-form-field>

    <mat-slide-toggle formControlName="is_admin" color="primary">
      Administrator
    </mat-slide-toggle>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="onSave()"
    [disabled]="!editForm.valid"
  >
    <mat-icon>save</mat-icon>
    Save Changes
  </button>
</mat-dialog-actions>
