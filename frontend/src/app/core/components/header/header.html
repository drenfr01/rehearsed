@if (isLoggedIn()) {
<mat-toolbar class="app-header">
  <div class="header-container">
    <!-- Logo -->
    <div class="header-logo">
      <img src="rehearsed_logo.svg" alt="Rehearsed" />
    </div>

    <!-- Center Navigation -->
    <nav class="nav-center">
      <!-- Scenario Selection with Dropdown -->
      <div class="scenario-dropdown">
        <button mat-button class="scenario-trigger" [class.open]="isDropdownOpen" (click)="toggleDropdown()">
          Scenario Selection
          <mat-icon>expand_more</mat-icon>
        </button>

        <div class="dropdown-menu" [class.open]="isDropdownOpen">
          <a class="dropdown-item" *ngFor="let scenario of scenarios"
            (click)="selectScenario(scenario); closeDropdown()">
            <img src="scenario_icon.svg" alt="" class="scenario-icon" />
            {{ scenario.name }}
          </a>
        </div>
      </div>

      <!-- Other Navigation Links -->
      <a mat-button routerLink="/app/scenario-overview" routerLinkActive="active-link" class="nav-link">
        Scenario Overview
      </a>

      <a mat-button routerLink="/app/classroom" routerLinkActive="active-link" class="nav-link">
        Classroom
      </a>
    </nav>

    <!-- Right Navigation -->
    <div class="nav-right">
      <button mat-raised-button class="new-session-button" (click)="createSession()">
        <img src = "scenario_icon.svg" alt="" class="new-session-icon" />
        New Session
      </button>


      <a mat-button class="logout-link" (click)="logout()">
        Logout
      </a>
    </div>
  </div>
</mat-toolbar>
}
