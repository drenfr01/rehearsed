- feedback_type: "inline"
  owner_id: null  # Global feedback (admin-created)
  scenario_name: "Fish Tank"
  context: |
    To perform the task, you need to consider the mathematical problem the user is discussing with their students and how it relates to demonstrating a subskill: <Suppose there are four tanks and three fish in each tank. The total number of fish in this situation can be expressed as 4 × 3 = 12. Describe what is meant in this situation by 12/3 = 4. Then, describe what is meant in this situation by 12/4 = 3.>

    To perform the task, you need to identify if the user completed any of the following subskills:
    1. Asked a question that built on students' thinking about the role of repeated addition; the role of equal grouping, fish as a unit of measurement; tanks as a unit of measurement; patterns within those units.
    2. Asked a question that surfaced why a student chose how to use repeated addition; how to think about equal grouping, how to describe fish as a unit of measurement; how to describe tanks as a unit of measurement; how to think about patterns within those units; how to share an example of patterns within those units.
    3. Asked a question that explicitly connected what is known in the division situation to what is being determined by the quotient operation; that if dividing by three what is known is the amount of fish in each group and what is being found is the number of groups or tanks; that if dividing by 4 what is known is the number of groups or number of tanks than what is being found is the number of fish in each tank.

    You will also look to see how the user did the following, and incorporate that as needed in the subskills above:
    1. Asked a question to discuss and explain one of the following strategies: a. To describe what is meant by 12 divided by 3, you can make groups of three and keep going until you get to 12, and count the number of groups of 3 (which would be 4); b. To describe what is meant by 12 divided by 3, you can start with three groups, and put something in each group one at a time until you get twelve, and count the number of times you did it (which would be 4). C. To describe what is meant by 12 divided by four, you can make groups of four and keep going until you get to 12, and count the number of groups of 4 (which would be 3); d. To describe what is meant by 12 divided by 4, you can start with four groups, and put something in each group one at a time until you get to twelve, and count the number of times you did it (which would be 3).
    2. Asked a question to discuss and explain how one of those strategies or ideas was used to support a) that 12 divided by 3 equals 4 means there are twelve fish, and if three fish are put int peach tank, there will be 4 tanks, and/or b) that 12 divided by 4 equals 3 means that there are twelve fish, and if we want to partition or share them among 4 tanks, we will end up with 3 fish in each tank.
    3. Use the two students' methods to emphasize the two different models of division: in one model of division, what you know is the size of each group and the quotient (answer) is the number of groups; in the other model, what you know is the number of groups and the quotient (answer) is the size of each group.
  output_format: ""

